<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolicyPulse — Political & Trade News Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f1f5f9;
      --card:      #ffffff;
      --border:    #e2e8f0;
      --text:      #1e293b;
      --muted:     #64748b;
      --subtle:    #94a3b8;
      --header:    #0f172a;
      --blue:      #3b82f6;
      --red:       #ef4444;
      --green:     #22c55e;
      --amber:     #f59e0b;
      --purple:    #8b5cf6;
      --radius:    10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      background: var(--header);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,.4);
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }
    .logo span { color: #60a5fa; }

    .search-wrap {
      flex: 1;
      max-width: 420px;
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,.4);
      pointer-events: none;
      font-size: .85rem;
    }
    .search-input {
      width: 100%;
      padding: 7px 12px 7px 30px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      color: #fff;
      font-size: .85rem;
      outline: none;
      transition: background .15s, border-color .15s;
    }
    .search-input::placeholder { color: rgba(255,255,255,.4); }
    .search-input:focus {
      background: rgba(255,255,255,.15);
      border-color: rgba(255,255,255,.35);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }
    .last-updated {
      font-size: .72rem;
      color: rgba(255,255,255,.5);
      white-space: nowrap;
    }

    .btn {
      padding: 6px 14px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #60a5fa; color: #0f172a; }
    .btn-primary:not(:disabled):hover { background: #93c5fd; }
    .btn-ghost {
      background: rgba(255,255,255,.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,.2);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.18); }

    /* ── Toolbar ─────────────────────────────────────────── */
    .toolbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .filter-label {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--subtle);
      margin-right: 2px;
    }

    .pill {
      padding: 4px 11px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: .76rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
      line-height: 1;
    }
    .pill:hover { border-color: #94a3b8; color: var(--text); }
    .pill.on  { border-color: transparent; color: #fff; }
    .pill.on.tag-breaking  { background: var(--red); }
    .pill.on.tag-newsy     { background: var(--blue); }
    .pill.on.tag-evergreen { background: var(--green); }
    .pill.on.tag-type      { background: var(--purple); }
    .pill.on.tag-bookmark  { background: var(--amber); color: #1e293b; }

    .divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .item-count { font-size: .78rem; color: var(--muted); white-space: nowrap; }

    .view-toggle button {
      background: none;
      border: 1px solid var(--border);
      padding: 4px 8px;
      cursor: pointer;
      font-size: .8rem;
      color: var(--muted);
      transition: all .15s;
    }
    .view-toggle button:first-child { border-radius: 6px 0 0 6px; }
    .view-toggle button:last-child  { border-radius: 0 6px 6px 0; border-left: none; }
    .view-toggle button.on { background: var(--text); color: #fff; border-color: var(--text); }

    /* ── Main ────────────────────────────────────────────── */
    .main { max-width: 1440px; margin: 0 auto; padding: 20px 24px 40px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 14px;
    }
    .grid.compact {
      grid-template-columns: 1fr;
      gap: 0;
    }

    /* ── Cards ───────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 15px 16px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      transition: box-shadow .18s, border-color .18s;
      position: relative;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); border-color: #cbd5e1; }
    .card.bookmarked { border-left: 3px solid var(--amber); }

    /* compact row variant */
    .grid.compact .card {
      border-radius: 0;
      border-left: none;
      border-right: none;
      border-top: none;
      padding: 12px 20px;
      flex-direction: row;
      align-items: flex-start;
      gap: 14px;
    }
    .grid.compact .card:first-child { border-top: 1px solid var(--border); border-radius: 8px 8px 0 0; }
    .grid.compact .card:last-child  { border-radius: 0 0 8px 8px; }
    .grid.compact .card.bookmarked  { border-left: 3px solid var(--amber); }

    .card-meta {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .card-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: .67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      white-space: nowrap;
    }
    .badge-org   { color: #fff; }
    .badge-type  { background: #f1f5f9; color: #475569; }
    .badge-date  { background: #f8fafc; color: var(--subtle); font-weight: 500; }
    .badge-breaking  { background: #fee2e2; color: #b91c1c; }
    .badge-newsy     { background: #dbeafe; color: #1d4ed8; }
    .badge-evergreen { background: #dcfce7; color: #15803d; }

    .card-actions {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 3px 4px;
      border-radius: 5px;
      opacity: .45;
      transition: opacity .15s, background .15s;
    }
    .icon-btn:hover { opacity: 1; background: #f1f5f9; }
    .icon-btn.active { opacity: 1; }

    .card-title {
      font-size: .93rem;
      font-weight: 700;
      line-height: 1.45;
    }
    .card-title a {
      color: var(--text);
      text-decoration: none;
    }
    .card-title a:hover { color: var(--blue); text-decoration: underline; }

    .card-summary {
      font-size: .81rem;
      color: #475569;
      line-height: 1.55;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    .card-date { font-size: .73rem; color: var(--subtle); }
    .card-link {
      font-size: .76rem;
      font-weight: 600;
      color: var(--blue);
      text-decoration: none;
      margin-left: auto;
    }
    .card-link:hover { text-decoration: underline; }

    .copy-btn {
      padding: 4px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: .72rem;
      cursor: pointer;
      color: var(--muted);
      font-weight: 500;
      transition: all .15s;
      white-space: nowrap;
    }
    .copy-btn:hover { background: #e2e8f0; color: var(--text); }
    .copy-btn.copied { background: #dcfce7; color: #15803d; border-color: #86efac; }

    /* compact card adjustments */
    .grid.compact .card-compact-left  { flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; min-width: 130px; max-width: 140px; }
    .grid.compact .card-compact-right { flex: 1; min-width: 0; }
    .grid.compact .card-footer { padding-top: 6px; }
    .grid.compact .card-summary { display: none; }

    /* ── States ──────────────────────────────────────────── */
    .state-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: var(--muted);
      gap: 12px;
      text-align: center;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-icon { font-size: 2.5rem; }
    .state-msg { font-size: .9rem; }
    .state-sub { font-size: .8rem; color: var(--subtle); max-width: 380px; }

    /* ── Sources dropdown ────────────────────────────────── */
    .src-wrap { position: relative; }

    .src-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 11px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: .76rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
      white-space: nowrap;
    }
    .src-btn:hover { border-color: #94a3b8; color: var(--text); }
    .src-btn.active { border-color: transparent; background: var(--purple); color: #fff; }
    .src-btn .src-count {
      background: rgba(0,0,0,.12);
      padding: 1px 6px;
      border-radius: 999px;
      font-size: .68rem;
      font-weight: 700;
    }

    .src-panel {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 300;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      width: 310px;
      max-height: 600px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .src-panel.hidden { display: none !important; }

    .src-panel-head {
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .src-panel-title { font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .src-ctrl-btns { display: flex; gap: 6px; }
    .src-ctrl-btn {
      font-size: .72rem;
      font-weight: 600;
      color: var(--blue);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
    }
    .src-ctrl-btn:hover { text-decoration: underline; }

    .src-list { overflow-y: auto; flex: none; max-height: 180px; padding: 6px 0; }

    .src-group-label {
      padding: 6px 12px 3px;
      font-size: .67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--subtle);
    }

    .src-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      cursor: pointer;
      transition: background .1s;
      user-select: none;
    }
    .src-option:hover { background: #f8fafc; }
    .src-option input[type=checkbox] { accent-color: var(--purple); cursor: pointer; flex-shrink: 0; }
    .src-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .src-name { font-size: .8rem; color: var(--text); flex: 1; }

    /* ── Discover / Add Sources section ─────────────────── */
    .src-section-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 6px;
      flex-shrink: 0;
    }
    .src-section-divider::before, .src-section-divider::after {
      content: ""; flex: 1; height: 1px; background: var(--border);
    }
    .src-section-label {
      font-size: .67rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; color: var(--subtle); white-space: nowrap;
    }

    .src-suggest-bar { padding: 0 10px 8px; flex-shrink: 0; }
    .src-suggest-input {
      width: 100%; padding: 6px 10px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: .78rem; color: var(--text); outline: none;
      transition: border-color .15s;
    }
    .src-suggest-input:focus { border-color: var(--blue); }
    .src-suggest-input::placeholder { color: var(--subtle); }

    .src-suggest-list {
      overflow-y: auto; max-height: 150px; flex-shrink: 0;
      border-top: 1px solid var(--border);
    }
    .suggest-item {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 12px; transition: background .1s;
    }
    .suggest-item:hover { background: #f8fafc; }
    .suggest-name {
      font-size: .79rem; color: var(--text); flex: 1;
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .suggest-type { font-size: .67rem; color: var(--subtle); flex-shrink: 0; }
    .suggest-add-btn {
      font-size: .72rem; font-weight: 600; color: var(--blue);
      background: none; border: 1px solid currentColor;
      border-radius: 4px; padding: 2px 7px; cursor: pointer;
      flex-shrink: 0; white-space: nowrap; transition: all .15s;
    }
    .suggest-add-btn:hover { background: var(--blue); color: #fff; }
    .suggest-added-btn {
      font-size: .72rem; font-weight: 600; color: var(--green);
      background: none; border: 1px solid currentColor;
      border-radius: 4px; padding: 2px 7px; cursor: pointer;
      flex-shrink: 0; white-space: nowrap; transition: all .15s;
    }
    .suggest-added-btn:hover { background: #fef2f2; color: var(--red); border-color: var(--red); }

    .src-custom-area {
      padding: 10px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .src-custom-row { display: flex; gap: 6px; }
    .src-custom-input {
      flex: 1; padding: 6px 10px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: .78rem; color: var(--text); outline: none; min-width: 0;
      transition: border-color .15s;
    }
    .src-custom-input:focus { border-color: var(--blue); }
    .src-custom-input::placeholder { color: var(--subtle); font-size: .73rem; }
    .src-test-btn {
      padding: 6px 12px; background: var(--blue); color: #fff;
      border: none; border-radius: 6px; font-size: .78rem; font-weight: 600;
      cursor: pointer; flex-shrink: 0; transition: background .15s;
    }
    .src-test-btn:hover { background: #2563eb; }
    .src-test-btn:disabled { opacity: .5; cursor: not-allowed; }

    .probe-result { margin-top: 8px; font-size: .8rem; overflow-y: auto; }
    .probe-loading { color: var(--muted); font-style: italic; }
    .probe-error { color: var(--red); }
    .probe-preview {
      background: #f8fafc; border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px;
    }
    .probe-feed-name { font-weight: 700; color: var(--text); margin-bottom: 2px; font-size: .82rem; }
    .probe-feed-meta { font-size: .72rem; color: var(--subtle); margin-bottom: 6px; }
    .probe-sample-item {
      font-size: .74rem; color: var(--muted); margin: 2px 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .probe-sample-item a { color: var(--blue); text-decoration: none; }
    .probe-sample-item a:hover { text-decoration: underline; }
    .probe-actions { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }
    .probe-name-input, .probe-type-select {
      width: 100%; padding: 5px 8px;
      border: 1px solid var(--border); border-radius: 5px;
      font-size: .78rem; color: var(--text); outline: none; background: #fff;
    }
    .probe-name-input:focus, .probe-type-select:focus { border-color: var(--blue); }
    .probe-type-select { cursor: pointer; }
    .src-add-btn {
      padding: 6px 12px; background: var(--green); color: #fff;
      border: none; border-radius: 6px; font-size: .78rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .src-add-btn:hover { background: #16a34a; }
    .probe-already-note { color: var(--green); font-weight: 600; margin-top: 6px; }
    .no-suggestions { padding: 8px 12px; font-size: .78rem; color: var(--subtle); font-style: italic; }

    /* Google News fallback label */
    .probe-gnews-note {
      font-size: .74rem; color: #5f6368;
      background: #f8f9fa; border: 1px solid var(--border);
      border-radius: 5px; padding: 5px 8px; margin-bottom: 8px;
    }
    .probe-gnews-badge {
      font-size: .65rem; color: #5f6368; background: #f1f3f4;
      border-radius: 3px; padding: 2px 6px; white-space: nowrap; flex-shrink: 0;
    }

    /* multi-feed discover results */
    .probe-multi-header {
      font-size: .72rem; font-weight: 700; color: var(--subtle);
      text-transform: uppercase; letter-spacing: .4px;
      padding: 4px 0 5px;
    }
    .probe-multi-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; background: #f8fafc;
      border: 1px solid var(--border); border-radius: 6px; margin-bottom: 5px;
    }
    .probe-multi-info { flex: 1; min-width: 0; }
    .probe-multi-item .probe-feed-name {
      margin-bottom: 1px; font-size: .8rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .probe-quick-add { padding: 4px 10px; font-size: .73rem; white-space: nowrap; }
    .probe-already-badge {
      font-size: .72rem; color: var(--green); font-weight: 600; white-space: nowrap;
    }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: .83rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 500;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 680px) {
      .header { padding: 0 14px; gap: 10px; }
      .search-wrap { max-width: 180px; }
      .toolbar { padding: 8px 14px; gap: 10px; }
      .main { padding: 14px 14px 40px; }
      .grid { grid-template-columns: 1fr; }
      .last-updated, .btn-ghost { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────── -->
<header class="header">
  <div class="logo">Policy<span>Pulse</span></div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" class="search-input"
           type="search" placeholder="Search headlines, orgs…" autocomplete="off">
  </div>

  <div class="header-right">
    <span class="last-updated" id="lastUpdated">Loading…</span>
    <button class="btn btn-ghost" onclick="exportVisible()">⬇ Export</button>
    <button class="btn btn-primary" id="refreshBtn" onclick="doRefresh()">↻ Refresh</button>
  </div>
</header>

<!-- ── Toolbar ─────────────────────────────────────────────────── -->
<div class="toolbar">
  <!-- Tag filters -->
  <div class="filter-group">
    <span class="filter-label">Show</span>
    <button class="pill on tag-breaking" data-tag="breaking"  onclick="toggleTag(this)">🔴 Breaking</button>
    <button class="pill on tag-newsy"    data-tag="newsy"     onclick="toggleTag(this)">🔵 Newsy</button>
    <button class="pill on tag-evergreen"data-tag="evergreen" onclick="toggleTag(this)">🟢 Evergreen</button>
  </div>

  <div class="divider"></div>

  <!-- Org type filters (built dynamically) -->
  <div class="filter-group" id="orgTypeGroup">
    <span class="filter-label">Org</span>
  </div>

  <div class="divider"></div>

  <!-- Sources dropdown -->
  <div class="filter-group">
    <div class="src-wrap" id="srcWrap">
      <button class="src-btn" id="srcBtn" onclick="toggleSrcPanel(event)">
        Sources <span class="src-count" id="srcBtnCount">—</span> ▾
      </button>
      <div class="src-panel hidden" id="srcPanel">
        <div class="src-panel-head">
          <span class="src-panel-title">Filter by source</span>
          <div class="src-ctrl-btns">
            <button class="src-ctrl-btn" onclick="selectAllSrc()">All</button>
            <button class="src-ctrl-btn" onclick="clearAllSrc()">None</button>
          </div>
        </div>
        <div class="src-list" id="srcList"></div>

        <!-- ── Add Sources section ── -->
        <div class="src-section-divider"><span class="src-section-label">Add Sources</span></div>

        <div class="src-suggest-bar">
          <input type="text" id="suggestSearch" class="src-suggest-input"
                 placeholder="Search suggestions…" oninput="filterSuggestions()">
        </div>
        <div class="src-suggest-list" id="suggestList"></div>

        <div class="src-custom-area">
          <div class="src-custom-row">
            <input type="text" id="customFeedUrl" class="src-custom-input"
                   placeholder="Site URL or domain, e.g. vox.com"
                   onkeydown="if(event.key==='Enter')discoverFeeds()">
            <button class="src-test-btn" id="testFeedBtn" onclick="discoverFeeds()">Search</button>
          </div>
          <div id="probeResult" class="probe-result" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Bookmark filter -->
  <div class="filter-group">
    <button class="pill tag-bookmark" id="bookmarkPill" onclick="toggleBookmarksOnly()">⭐ Saved</button>
  </div>

  <!-- Right side -->
  <div class="toolbar-right">
    <span class="item-count" id="itemCount"></span>
    <div class="view-toggle">
      <button id="gridViewBtn"    class="on" onclick="setView('grid')"    title="Grid view">⊞</button>
      <button id="compactViewBtn"          onclick="setView('compact')" title="Compact view">≡</button>
    </div>
  </div>
</div>

<!-- ── Main ────────────────────────────────────────────────────── -->
<main class="main">
  <div id="loading" class="state-center">
    <div class="spinner"></div>
    <p class="state-msg">Fetching the latest from <strong id="srcCount">—</strong> sources…</p>
  </div>

  <div id="grid" class="grid" style="display:none"></div>

  <div id="emptyState" class="state-center" style="display:none">
    <span class="error-icon">🔍</span>
    <p class="state-msg">No items match your filters.</p>
    <p class="state-sub">Try adjusting the tag or org filters, or clearing your search.</p>
  </div>

  <div id="errorState" class="state-center" style="display:none">
    <span class="error-icon">⚠️</span>
    <p class="state-msg" id="errorMsg">Could not load feeds.</p>
    <p class="state-sub">Make sure the server is running on port 5050 and <code>feedparser</code> is installed.</p>
  </div>
</main>

<!-- ── Toast ────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────
let allItems      = [];
let baseItems     = [];   // items from /api/items
let customItems   = [];   // items from /api/custom-fetch
let orgTypes      = [];
let activeTags    = new Set(["breaking", "newsy", "evergreen"]);
let activeTypes   = new Set();
let activeSources = new Set();   // individual org names
let allSources    = [];          // [{name, color, type}, …]
let bookmarksOnly = false;
let searchQ       = "";
let currentView   = "grid";
let bookmarks     = new Set(JSON.parse(localStorage.getItem("pp_bm") || "[]"));
let customFeeds   = JSON.parse(localStorage.getItem("pp_custom_feeds") || "[]");

// Curated suggestions (verified working feeds not in the default set)
const CURATED = [
  { name: "Atlantic Council",              url: "https://www.atlanticcouncil.org/feed/",  type: "Think Tank", color: "#1a3a5c" },
  { name: "Niskanen Center",               url: "https://niskanencenter.org/feed/",        type: "Think Tank", color: "#2e4057" },
  { name: "R Street Institute",            url: "https://rstreet.org/feed/",               type: "Think Tank", color: "#7b241c" },
  { name: "Stateline (Pew)",               url: "https://stateline.org/feed/",             type: "Research",   color: "#154360" },
  { name: "KFF",                           url: "https://www.kff.org/feed/",               type: "Research",   color: "#922b21" },
  { name: "CA Health Care Foundation",     url: "https://www.chcf.org/feed/",              type: "Research",   color: "#1d6a39" },
  { name: "Eno Transportation Foundation", url: "https://enotrans.org/feed/",              type: "Think Tank", color: "#34495e" },
  { name: "T4America",                     url: "https://www.t4america.org/feed/",         type: "Advocacy",   color: "#c0392b" },
  { name: "Carbon180",                     url: "https://carbon180.org/feed/",             type: "Advocacy",   color: "#196f3d" },
];

// Map type → default badge color for newly probed feeds
const TYPE_COLORS = {
  "Think Tank":  "#1a3a5c", "Research":   "#154360", "Trade Org":   "#1d6a39",
  "Trade Union": "#7d6608", "Advocacy":   "#6c3483", "Government":  "#922b21",
  "Media":       "#1a5276",
};

// ── Helpers ────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function showToast(msg, ms = 2200) {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), ms);
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function relDate(d) {
  if (d === 0) return "Today";
  if (d === 1) return "Yesterday";
  if (d < 7)  return `${d}d ago`;
  if (d < 30) return `${Math.floor(d/7)}w ago`;
  return `${Math.floor(d/30)}mo ago`;
}

// ── Load / Refresh ─────────────────────────────────────────────────
let _warmRetry = null;   // handle for the auto-retry timer when server is warming

async function loadItems(forceRefresh = false) {
  clearTimeout(_warmRetry);
  $("loading").style.display = "";
  $("loading").querySelector(".state-msg").innerHTML =
    "Fetching the latest from <strong id=\"srcCount\">—</strong> sources…";
  $("grid").style.display = "none";
  $("emptyState").style.display = "none";
  $("errorState").style.display = "none";

  try {
    if (forceRefresh) {
      // /api/refresh blocks until it has fresh data (user-initiated, ~30s max)
      const r = await fetch("/api/refresh", { method: "POST" });
      if (!r.ok) throw new Error(`Refresh failed: HTTP ${r.status}`);
    }

    const resp = await fetch("/api/items");
    if (!resp.ok) throw new Error(`Server returned HTTP ${resp.status}`);
    const data = await resp.json();
    $("srcCount").textContent = data.sources || "—";

    if (data.warming) {
      // Background feed-fetch still running (cold start) — retry automatically
      $("loading").querySelector(".state-msg").innerHTML =
        "⏳ Server is waking up — feeds loading in the background." +
        `<br><small>Retrying in ~10 s &nbsp;·&nbsp;
          <a href="#" style="color:var(--blue)"
             onclick="event.preventDefault();clearTimeout(_warmRetry);loadItems()">
            Retry now</a></small>`;
      _warmRetry = setTimeout(() => loadItems(), 10000);
      return;
    }

    processData(data);

    // Silently fetch any user-added custom feeds and merge
    if (customFeeds.length > 0) {
      await fetchCustomItems();
    }
  } catch (e) {
    $("loading").style.display = "none";
    $("errorState").style.display = "";
    $("errorMsg").textContent = `Error: ${e.message}`;
  }
}

function processData(data) {
  baseItems = data.items || [];
  $("lastUpdated").textContent = "Updated " + (data.fetched_at || "—");
  $("loading").style.display = "none";
  mergeAndRefresh();
}

function mergeAndRefresh() {
  // Merge base + custom, deduplicate by id
  const seen = new Set();
  allItems = [...baseItems, ...customItems]
    .filter(i => { if (seen.has(i.id)) return false; seen.add(i.id); return true; })
    .sort((a, b) => b.published_ts - a.published_ts);

  // Rebuild org types
  orgTypes = [...new Set(allItems.map(i => i.org_type))].sort();

  // Rebuild sources list
  const seenSrc = new Set();
  const prevActive = new Set(activeSources);  // keep existing selections
  allSources = [];
  [...allItems]
    .sort((a,b) => (a.org_type+a.org).localeCompare(b.org_type+b.org))
    .forEach(i => {
      if (!seenSrc.has(i.org)) {
        seenSrc.add(i.org);
        allSources.push({ name: i.org, color: i.org_color, type: i.org_type });
      }
    });

  // New sources start active; previously deselected sources stay deselected
  activeSources = new Set(
    allSources.map(s => s.name).filter(n => prevActive.size === 0 || prevActive.has(n))
  );
  if (activeSources.size === 0) activeSources = new Set(allSources.map(s => s.name));

  // New org types start active
  orgTypes.forEach(t => activeTypes.add(t));

  buildOrgFilters();
  buildSourceDropdown();
  render();
}

async function fetchCustomItems() {
  if (customFeeds.length === 0) { customItems = []; mergeAndRefresh(); return; }
  try {
    const resp = await fetch("/api/custom-fetch", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ feeds: customFeeds }),
    });
    const data = await resp.json();
    customItems = data.items || [];
  } catch (e) {
    console.warn("Custom feeds failed:", e);
    customItems = [];
  }
  mergeAndRefresh();
}

async function doRefresh() {
  const btn = $("refreshBtn");
  btn.disabled = true;
  btn.textContent = "↺ Refreshing…";
  await loadItems(true);
  btn.disabled = false;
  btn.textContent = "↻ Refresh";
  showToast("✓ Feeds refreshed!");
}

// ── Filters ────────────────────────────────────────────────────────
function buildOrgFilters() {
  const group = $("orgTypeGroup");
  // remove old pills (keep the label)
  group.querySelectorAll(".pill").forEach(p => p.remove());

  orgTypes.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "pill on tag-type";
    btn.dataset.orgType = t;
    btn.textContent = t;
    btn.onclick = () => toggleOrgType(btn, t);
    group.appendChild(btn);
  });
}

function toggleTag(btn) {
  const tag = btn.dataset.tag;
  if (activeTags.has(tag)) { activeTags.delete(tag); btn.classList.remove("on"); }
  else                      { activeTags.add(tag);    btn.classList.add("on"); }
  render();
}

function toggleOrgType(btn, type) {
  if (activeTypes.has(type)) { activeTypes.delete(type); btn.classList.remove("on"); }
  else                        { activeTypes.add(type);    btn.classList.add("on"); }
  render();
}

function toggleBookmarksOnly() {
  bookmarksOnly = !bookmarksOnly;
  const pill = $("bookmarkPill");
  bookmarksOnly ? pill.classList.add("on") : pill.classList.remove("on");
  render();
}

function setView(v) {
  currentView = v;
  const grid = $("grid");
  grid.className = v === "compact" ? "grid compact" : "grid";
  $("gridViewBtn").className    = v === "grid"    ? "on" : "";
  $("compactViewBtn").className = v === "compact" ? "on" : "";
  render();
}

$("searchInput").addEventListener("input", e => {
  searchQ = e.target.value.trim().toLowerCase();
  render();
});

// ── Render ─────────────────────────────────────────────────────────
function filtered() {
  return allItems.filter(item => {
    if (!activeTags.has(item.tag))                return false;
    if (!activeTypes.has(item.org_type))          return false;
    if (!activeSources.has(item.org))             return false;
    if (bookmarksOnly && !bookmarks.has(item.id)) return false;
    if (searchQ) {
      return item.title.toLowerCase().includes(searchQ)
          || (item.summary || "").toLowerCase().includes(searchQ)
          || item.org.toLowerCase().includes(searchQ);
    }
    return true;
  });
}

// ── Sources dropdown ───────────────────────────────────────────────
function buildSourceDropdown() {
  const list = $("srcList");
  // Group by org type
  const groups = {};
  allSources.forEach(s => {
    (groups[s.type] = groups[s.type] || []).push(s);
  });

  list.innerHTML = Object.keys(groups).sort().map(type => `
    <div class="src-group-label">${esc(type)}</div>
    ${groups[type].map(s => `
      <label class="src-option">
        <input type="checkbox" checked data-src="${esc(s.name)}"
               onchange="toggleSrc(this)">
        <span class="src-dot" style="background:${esc(s.color)}"></span>
        <span class="src-name">${esc(s.name)}</span>
      </label>
    `).join("")}
  `).join("");

  updateSrcBtn();
  buildSuggestList();
}

function updateSrcBtn() {
  const total = allSources.length;
  const active = activeSources.size;
  const btn = $("srcBtn");
  $("srcBtnCount").textContent = active === total ? `${total}` : `${active}/${total}`;
  btn.classList.toggle("active", active < total);
}

function toggleSrc(cb) {
  const name = cb.dataset.src;
  cb.checked ? activeSources.add(name) : activeSources.delete(name);
  updateSrcBtn();
  render();
}

function selectAllSrc() {
  activeSources = new Set(allSources.map(s => s.name));
  $("srcList").querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = true);
  updateSrcBtn();
  render();
}

function clearAllSrc() {
  activeSources.clear();
  $("srcList").querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = false);
  updateSrcBtn();
  render();
}

function toggleSrcPanel(e) {
  e.stopPropagation();
  $("srcPanel").classList.toggle("hidden");
}

// Close dropdown when clicking outside
document.addEventListener("click", e => {
  if (!$("srcWrap").contains(e.target)) {
    $("srcPanel").classList.add("hidden");
  }
});

// ── Discover / Add Sources ──────────────────────────────────────────
function saveCustomFeeds() {
  localStorage.setItem("pp_custom_feeds", JSON.stringify(customFeeds));
}

function isAdded(url) {
  return customFeeds.some(f => f.url === url);
}

function buildSuggestList() {
  const list = $("suggestList");
  if (!list) return;
  const q = ($("suggestSearch")?.value || "").toLowerCase();
  const visible = CURATED.filter(s =>
    !q || s.name.toLowerCase().includes(q) || s.type.toLowerCase().includes(q)
  );
  if (visible.length === 0) {
    list.innerHTML = '<div class="no-suggestions">No matches</div>';
    return;
  }
  list.innerHTML = visible.map(s => {
    const added = isAdded(s.url);
    return `<div class="suggest-item">
      <span class="src-dot" style="background:${esc(s.color)}"></span>
      <span class="suggest-name" title="${esc(s.name)}">${esc(s.name)}</span>
      <span class="suggest-type">${esc(s.type)}</span>
      ${added
        ? `<button class="suggest-added-btn" onclick="removeFeedByUrl('${esc(s.url)}')" title="Click to remove">✓</button>`
        : `<button class="suggest-add-btn" onclick="addSuggestion('${esc(s.url)}')">+ Add</button>`
      }
    </div>`;
  }).join("");
}

function filterSuggestions() { buildSuggestList(); }

async function addFeed(feed) {
  if (isAdded(feed.url)) return;
  customFeeds.push(feed);
  saveCustomFeeds();
  showToast(`Adding "${feed.name}"…`);
  buildSuggestList();
  await fetchCustomItems();
  showToast(`✓ "${feed.name}" added to dashboard`);
}

function addSuggestion(url) {
  const feed = CURATED.find(s => s.url === url);
  if (feed) addFeed({ ...feed });
}

function removeFeedByUrl(url) {
  const feed = customFeeds.find(f => f.url === url);
  if (!feed) return;
  customFeeds = customFeeds.filter(f => f.url !== url);
  saveCustomFeeds();
  customItems = customItems.filter(i => i.org !== feed.name);
  // Also remove from activeSources so it doesn't orphan the filter
  activeSources.delete(feed.name);
  mergeAndRefresh();
  buildSuggestList();
  showToast(`Removed "${feed.name}"`);
}

async function discoverFeeds() {
  const urlInput = $("customFeedUrl");
  const btn = $("testFeedBtn");
  const q = urlInput.value.trim();
  if (!q) { showToast("Enter a site URL or domain to search."); return; }

  const result = $("probeResult");
  result.innerHTML = '<div class="probe-loading">🔍 Searching for feeds…</div>';
  result.style.display = "";
  btn.disabled = true;

  try {
    const resp = await fetch("/api/discover-feeds?" + new URLSearchParams({ q }));
    const data = await resp.json();

    if (!data.feeds || data.feeds.length === 0) {
      result.innerHTML = `<div class="probe-error">❌ No RSS/Atom feeds found at this site.</div>`;
      return;
    }

    if (data.feeds.length === 1) {
      // Single result — show editable name + type selector before adding
      const f = data.feeds[0];
      const already = isAdded(f.url);
      const typeOptions = Object.keys(TYPE_COLORS)
        .map(t => `<option${t === "Media" ? " selected" : ""}>${esc(t)}</option>`)
        .join("");
      const gnewsNote = f.via_google
        ? `<div class="probe-gnews-note">📰 No direct RSS feed found — showing recent articles via Google News</div>`
        : "";
      result.innerHTML = `
        <div class="probe-preview">
          ${gnewsNote}
          <div class="probe-feed-name">${esc(f.name)}</div>
          <div class="probe-feed-meta">${f.count} items in feed</div>
          ${f.sample.map(s =>
            `<div class="probe-sample-item">• <a href="${esc(s.link)}" target="_blank" rel="noopener">${esc(s.title)}</a></div>`
          ).join("")}
          ${already
            ? `<div class="probe-already-note">✓ Already in your sources</div>`
            : `<div class="probe-actions">
                <input id="probeName" class="probe-name-input" value="${esc(f.name)}" placeholder="Display name">
                <select id="probeType" class="probe-type-select">${typeOptions}</select>
                <button class="src-add-btn" onclick="addProbed('${esc(f.url)}')">+ Add to Dashboard</button>
               </div>`
          }
        </div>`;
    } else {
      // Multiple feeds found — show compact list with one-click add
      result.innerHTML = `
        <div class="probe-multi-header">${data.feeds.length} feeds found</div>
        ${data.feeds.map((f, i) => {
          const already = isAdded(f.url);
          const btnId = `_pb${i}`;
          const gBadge = f.via_google
            ? `<span class="probe-gnews-badge">via Google News</span>` : "";
          return `
            <div class="probe-multi-item">
              <div class="probe-multi-info">
                <div class="probe-feed-name">${esc(f.name)} ${gBadge}</div>
                <div class="probe-feed-meta">${f.count} items</div>
              </div>
              <div id="${btnId}">
                ${already
                  ? `<span class="probe-already-badge">✓ Added</span>`
                  : `<button class="src-add-btn probe-quick-add"
                       onclick="addProbedQuick('${esc(f.url)}','${esc(f.name)}','${btnId}')">+ Add</button>`
                }
              </div>
            </div>`;
        }).join("")}`;
    }
  } catch (e) {
    result.innerHTML = `<div class="probe-error">❌ ${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
  }
}

async function addProbed(feedUrl) {
  const name  = ($("probeName")?.value.trim()) || feedUrl;
  const type  = ($("probeType")?.value)        || "Media";
  const color = TYPE_COLORS[type] || "#4a5568";
  await addFeed({ name, url: feedUrl, type, color });
  $("probeResult").style.display = "none";
  $("customFeedUrl").value = "";
}

async function addProbedQuick(feedUrl, feedName, btnContainerId) {
  const type  = "Media";
  const color = TYPE_COLORS[type] || "#4a5568";
  const container = $(btnContainerId);
  if (container) container.innerHTML = "<span class='probe-already-badge'>Adding…</span>";
  await addFeed({ name: feedName, url: feedUrl, type, color });
  if (container) container.innerHTML = "<span class='probe-already-badge'>✓ Added</span>";
}

function render() {
  const items = filtered();
  $("itemCount").textContent = `${items.length} of ${allItems.length} items`;

  if (items.length === 0) {
    $("grid").style.display = "none";
    $("emptyState").style.display = "";
    return;
  }
  $("emptyState").style.display = "none";
  $("grid").style.display = "";

  const isCompact = currentView === "compact";
  $("grid").innerHTML = items.map(item => cardHTML(item, isCompact)).join("");
}

function cardHTML(item, compact) {
  const bm = bookmarks.has(item.id);
  const tagLabel = { breaking: "🔴 Breaking", newsy: "🔵 Newsy", evergreen: "🟢 Evergreen" };
  const badges = `
    <span class="badge badge-org" style="background:${esc(item.org_color)}">${esc(item.org)}</span>
    <span class="badge badge-type">${esc(item.org_type)}</span>
    <span class="badge badge-${esc(item.tag)}">${tagLabel[item.tag] || item.tag}</span>
    <span class="badge badge-date">${relDate(item.days_old)}</span>
  `;
  const actions = `
    <button class="icon-btn${bm?" active":""}" title="${bm?"Remove bookmark":"Bookmark"}"
            onclick="toggleBM('${esc(item.id)}')">⭐</button>
    <button class="copy-btn" onclick="copyItem(this,'${esc(item.id)}')">Copy</button>
  `;
  const titleEl = `<div class="card-title"><a href="${esc(item.link)}" target="_blank" rel="noopener">${esc(item.title)}</a></div>`;
  const footer  = `
    <div class="card-footer">
      <span class="card-date">${esc(item.published)}</span>
      <a class="card-link" href="${esc(item.link)}" target="_blank" rel="noopener">Read full story →</a>
    </div>
  `;

  if (compact) {
    return `
      <article class="card${bm?" bookmarked":""}" id="c-${esc(item.id)}">
        <div class="card-compact-left">
          <div class="card-badges">${badges}</div>
        </div>
        <div class="card-compact-right">
          <div class="card-meta" style="margin-bottom:5px">
            ${titleEl}
            <div class="card-actions">${actions}</div>
          </div>
          ${footer}
        </div>
      </article>`;
  }

  return `
    <article class="card${bm?" bookmarked":""}" id="c-${esc(item.id)}">
      <div class="card-meta">
        <div class="card-badges">${badges}</div>
        <div class="card-actions">${actions}</div>
      </div>
      ${titleEl}
      ${item.summary ? `<p class="card-summary">${esc(item.summary)}</p>` : ""}
      ${footer}
    </article>`;
}

// ── Bookmarks ──────────────────────────────────────────────────────
function toggleBM(id) {
  if (bookmarks.has(id)) { bookmarks.delete(id); showToast("Bookmark removed"); }
  else                   { bookmarks.add(id);    showToast("⭐ Saved!"); }
  localStorage.setItem("pp_bm", JSON.stringify([...bookmarks]));
  render();
}

// ── Copy single item ───────────────────────────────────────────────
function copyItem(btn, id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  const text = [
    item.title,
    `${item.org} (${item.org_type}) — ${item.published}`,
    item.link,
    item.summary ? `\n${item.summary}` : "",
  ].filter(Boolean).join("\n");

  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = "✓ Copied";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = orig; btn.classList.remove("copied"); }, 2000);
  });
}

// ── Export visible ─────────────────────────────────────────────────
function exportVisible() {
  const items = filtered();
  if (!items.length) { showToast("No items to export."); return; }

  const sep = "─".repeat(62);
  const header = `PolicyPulse Export — ${new Date().toLocaleDateString("en-US",{dateStyle:"long"})}
${items.length} items | ${sep}`;

  const body = items.map(i => [
    `${i.title}`,
    `${i.org} (${i.org_type}) | ${i.published} | ${i.tag.toUpperCase()}`,
    i.link,
    i.summary || "",
    sep,
  ].filter(Boolean).join("\n")).join("\n\n");

  navigator.clipboard.writeText(`${header}\n\n${body}`).then(() => {
    showToast(`📋 Copied ${items.length} items to clipboard!`, 3000);
  });
}

// ── Init ───────────────────────────────────────────────────────────
loadItems();
</script>
</body>
</html>
